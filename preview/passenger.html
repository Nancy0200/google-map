<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>副駕駛互動頁 — Road Bulletin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .pass-hero {
      padding: 120px 24px 60px;
      text-align: center;
      background:
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(99,102,241,0.2) 0%, transparent 70%),
        linear-gradient(180deg, #0a0c14 0%, #080a12 100%);
    }
    .pass-hero-icon { font-size: 64px; display: block; margin-bottom: 20px; }
    .pass-hero-title {
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #a5b4fc, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .pass-hero-sub { color: var(--text-secondary); font-size: 15px; }

    .pass-main {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* Danmaku Display Panel */
    .danmaku-panel {
      position: relative;
      height: 160px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 24px;
      overflow: hidden;
    }
    .danmaku-label {
      position: absolute;
      top: 14px; left: 18px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-muted);
      text-transform: uppercase;
      z-index: 2;
      display: flex; align-items: center; gap: 6px;
    }
    .danmaku-label-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #a5b4fc;
      box-shadow: 0 0 8px #6366f1;
      animation: blink 1.5s infinite;
    }
    .danmaku-bg-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: var(--text-muted);
      opacity: 0.5;
    }

    /* Input area */
    .input-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 24px;
    }
    .input-row-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .input-section-label {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .char-count {
      font-size: 12px;
      color: var(--text-muted);
      transition: color 0.2s;
    }
    .char-count.warning { color: var(--traffic); }

    .type-select-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .type-option {
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: all 0.2s;
    }
    .type-option:hover { color: var(--text-primary); }
    .type-option.sel-traffic      { background: rgba(239,68,68,0.15);   border-color: var(--traffic);   color: #fca5a5; }
    .type-option.sel-incident     { background: rgba(249,115,22,0.15);  border-color: var(--incident);  color: #fdba74; }
    .type-option.sel-construction { background: rgba(234,179,8,0.15);   border-color: var(--construction); color: #fde047; }
    .type-option.sel-police       { background: rgba(59,130,246,0.15);  border-color: var(--police);    color: #93c5fd; }
    .type-option.sel-slow         { background: rgba(139,92,246,0.15);  border-color: var(--slow);      color: #c4b5fd; }

    textarea {
      width: 100%;
      min-height: 100px;
      resize: vertical;
      background: rgba(0,0,0,0.25);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 15px;
      font-family: var(--font-sans);
      padding: 14px 16px;
      line-height: 1.6;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 14px;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-muted); }

    .send-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
    }
    .btn-clear {
      padding: 10px 20px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: all 0.2s;
    }
    .btn-clear:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.2); }
    .btn-send {
      padding: 10px 28px;
      border-radius: var(--radius-pill);
      border: none;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: all 0.25s;
      box-shadow: 0 4px 16px rgba(99,102,241,0.35);
    }
    .btn-send:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(99,102,241,0.5);
    }
    .btn-send:active { transform: none; }

    /* Mini feed */
    .mini-feed-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .mini-feed-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .mini-feed-title { font-size: 15px; font-weight: 700; }
    .mini-feed-live {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: #86efac;
    }
    .mini-feed-body { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
    .mini-msg {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.025);
      border-radius: var(--radius-sm);
    }
    .mini-avatar { font-size: 20px; flex-shrink: 0; }
    .mini-body { flex: 1; }
    .mini-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .mini-content { font-size: 14px; color: var(--text-primary); }

    /* toast */
    .toast-container {
      position: fixed;
      bottom: 32px; left: 50%;
      transform: translateX(-50%);
      z-index: 5000;
      pointer-events: none;
    }
    .toast {
      padding: 12px 24px;
      border-radius: var(--radius-pill);
      background: rgba(17,24,39,0.92);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(16px);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      animation: toast-in 0.35s ease both, toast-out 0.35s ease 2.2s both;
    }
    @keyframes toast-in  { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
    @keyframes toast-out { to   { opacity:0; transform:translateY(-8px); } }
  </style>
</head>
<body>

<div id="danmaku-layer" aria-hidden="true"></div>

<nav class="navbar" id="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <span class="logo-icon">🛣️</span>
      <span class="logo-text">Road Bulletin</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html" class="nav-link">🏠 留言板</a></li>
      <li><a href="driver.html" class="nav-link">🚗 主駕駛</a></li>
      <li><a href="passenger.html" class="nav-link active">👤 副駕駛</a></li>
      <li><a href="history.html" class="nav-link">📋 歷史記錄</a></li>
    </ul>
    <div class="nav-status">
      <span class="status-dot live"></span>
      <span class="status-text">即時連線中</span>
    </div>
  </div>
</nav>

<div class="pass-hero">
  <span class="pass-hero-icon">👤</span>
  <h1 class="pass-hero-title">副駕駛互動頁</h1>
  <p class="pass-hero-sub">彈幕留言 × 手動回報，掌握全方位路況</p>
</div>

<main class="pass-main" id="main">

  <!-- Danmaku display -->
  <div class="danmaku-panel" id="danmaku-panel">
    <div class="danmaku-label">
      <span class="danmaku-label-dot"></span>
      彈幕模式
    </div>
    <div class="danmaku-bg-text">即時路況彈幕顯示區 — 新留言將在此滾動出現</div>
    <div id="danmaku-layer-panel" style="position:absolute;inset:0;overflow:hidden;pointer-events:none;"></div>
  </div>

  <!-- Input section -->
  <div class="input-section">
    <div class="input-row-top">
      <span class="input-section-label">發送路況留言</span>
      <span class="char-count" id="char-count">0 / 100</span>
    </div>

    <div class="type-select-row">
      <button class="type-option sel-traffic"  id="type-traffic"      data-type="traffic">🚗 塞車</button>
      <button class="type-option"              id="type-incident"     data-type="incident">⚠️ 突發</button>
      <button class="type-option"              id="type-construction" data-type="construction">🚧 施工</button>
      <button class="type-option"              id="type-police"       data-type="police">🚔 執法</button>
      <button class="type-option"              id="type-slow"         data-type="slow">🐢 車速慢</button>
    </div>

    <textarea id="msg-input" placeholder="輸入路況描述（最多 100 字）…" maxlength="100"></textarea>

    <div class="send-row">
      <button class="btn-clear" id="btn-clear">清除</button>
      <button class="btn-send"  id="btn-send">🚀 發送留言</button>
    </div>
  </div>

  <!-- Mini live feed -->
  <div class="mini-feed-panel">
    <div class="mini-feed-header">
      <span class="mini-feed-title">即時留言串</span>
      <span class="mini-feed-live">
        <span class="status-dot live" style="width:6px;height:6px;"></span>
        直播中
      </span>
    </div>
    <div class="mini-feed-body" id="mini-feed">
      <div class="mini-msg">
        <span class="mini-avatar">🚗</span>
        <div class="mini-body">
          <div class="mini-meta">主駕駛 · 塞車 · 08:52</div>
          <div class="mini-content">前方塞車，請注意！</div>
        </div>
      </div>
      <div class="mini-msg">
        <span class="mini-avatar">👤</span>
        <div class="mini-body">
          <div class="mini-meta">副駕駛 · 執法 · 08:49</div>
          <div class="mini-content">前方有警察執法，請注意速限。</div>
        </div>
      </div>
      <div class="mini-msg">
        <span class="mini-avatar">🚗</span>
        <div class="mini-body">
          <div class="mini-meta">主駕駛 · 施工 · 08:45</div>
          <div class="mini-content">前方道路施工，請減速慢行。</div>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="toast-container" id="toast-container"></div>
<footer class="footer">© 2026 Road Bulletin｜即時路況共享平台</footer>

<script src="app.js"></script>
<script>
  // Passenger page logic
  const textarea = document.getElementById('msg-input');
  const charCount = document.getElementById('char-count');
  const btnSend = document.getElementById('btn-send');
  const btnClear = document.getElementById('btn-clear');
  const miniFeed = document.getElementById('mini-feed');
  const toastContainer = document.getElementById('toast-container');
  let selectedType = 'traffic';
  let selectedTypeLabel = '🚗 塞車';

  // Char counter
  textarea.addEventListener('input', () => {
    const len = textarea.value.length;
    charCount.textContent = len + ' / 100';
    charCount.classList.toggle('warning', len >= 90);
  });

  // Type selection
  document.querySelectorAll('.type-option').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.type-option').forEach(b => {
        b.className = 'type-option';
      });
      selectedType = btn.dataset.type;
      selectedTypeLabel = btn.textContent;
      btn.classList.add('sel-' + selectedType);
    });
  });

  // Clear
  btnClear.addEventListener('click', () => {
    textarea.value = '';
    charCount.textContent = '0 / 100';
    charCount.classList.remove('warning');
  });

  // Send
  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    toastContainer.appendChild(t);
    setTimeout(() => t.remove(), 2700);
  }

  btnSend.addEventListener('click', () => {
    const content = textarea.value.trim();
    if (!content) { showToast('⚠️ 請輸入留言內容'); return; }

    // Add to mini feed
    const now = new Date();
    const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    const item = document.createElement('div');
    item.className = 'mini-msg';
    item.style.animation = 'slide-in 0.4s ease both';
    item.innerHTML = `
      <span class="mini-avatar">👤</span>
      <div class="mini-body">
        <div class="mini-meta">副駕駛 · ${selectedTypeLabel} · ${timeStr}</div>
        <div class="mini-content">${content}</div>
      </div>`;
    miniFeed.prepend(item);

    showToast('✅ 留言已發送！');
    textarea.value = '';
    charCount.textContent = '0 / 100';
    charCount.classList.remove('warning');
  });

  // Panel danmaku
  const panelLayer = document.getElementById('danmaku-layer-panel');
  const msgs = [
    { text: '🚗 前方塞車！', color: '#fca5a5' },
    { text: '🚔 警察執法，注意速限', color: '#93c5fd' },
    { text: '🚧 施工中，減速', color: '#fde047' },
    { text: '⚠️ 突發狀況！', color: '#fdba74' },
    { text: '🐢 車速很慢', color: '#c4b5fd' },
  ];
  let mi = 0;
  function spawnPanel() {
    const el = document.createElement('div');
    el.className = 'danmaku-item';
    el.textContent = msgs[mi % msgs.length].text;
    el.style.color = msgs[mi % msgs.length].color;
    el.style.top = (15 + Math.random() * 55) + '%';
    el.style.right = '-30%';
    panelLayer.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
    mi++;
  }
  setInterval(spawnPanel, 2500);
  setTimeout(spawnPanel, 800);
</script>
</body>
</html>
